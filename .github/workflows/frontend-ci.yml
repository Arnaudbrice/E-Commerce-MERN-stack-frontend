name: Frontend CI-Pipeline
# Die Pipeline startet bei jedem Push oder Pull Request auf dem Main-Branch
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build-and-test:
    # GitHub stellt uns einen virtuellen Ubuntu-Server gratis zur Verfügung
    runs-on: ubuntu-latest

    steps:
      # 1. Den Code aus deinem Repository auf den Server herunterladen
      - name: Code auschecken
        uses: actions/checkout@v5

      # 2. Node.js installieren (Version 20 ist aktuell und stabil)
      - name: Node.js einrichten
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm" # Aktiviert automatisches Caching für schnellere Testläufe

      # 3. Alle Projektabhängigkeiten installieren (wie auf deinem PC)
      - name: Node-Module installieren
        run: npm ci # 'npm ci' ist sauberer und schneller als 'npm install' in Pipelines

      # 4. Prüfen, ob das React-Projekt ohne Fehler kompiliert / baut
      - name: Projekt bauen
        run: npm run build

      # 5. Optional: TypeScript-Typen prüfen (falls wir TypeScript verwenden)
    #  - name: TypeScript Typen prüfen
    #    run: npm run tsc -- --noEmit # Verhindert, dass fehlerhafte Typen überhaupt getestet werden

    # 6. Die automatisierten Tests ausführen (falls du welche hast)
    #Ohne den watchAll Parameter würde der GitHub Actions Server unendlich lange auf Änderungen warten. Der Workflow würde niemals fertiggestellt werden („hängenbleiben“), bis er nach Stunden das Zeitlimit überschreitet.
    # - name: Tests ausführen
    #   run: npm test -- --watchAll=false
